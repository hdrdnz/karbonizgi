name: Docker Build & Push

on:
  push:
    branches:
      - main  # Main branch'e push olduğunda çalıştır

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v3

      - name: Docker Hub'a giriş yap
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Docker Image'ı Build Et
        run: docker build -t havvanur20/karbonizgi:latest .

      - name: Docker Hub'a Push Et
        run: |
          docker tag havvanur20/karbonizgi:latest havvanur20/karbonizgi:latest
          docker push havvanur20/karbonizgi:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build  # Deploy aşaması sadece build tamamlandıktan sonra çalışsın
    steps:
      - name: Sunucuya SSH ile bağlanıp güncelleme yap
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull havvanur20/karbonizgi:latest
            docker stop karbonizgi_container || true
            docker rm karbonizgi_container || true
            docker run -d --name karbonizgi_container -p 80:80 havvanur20/karbonizgi:latest
